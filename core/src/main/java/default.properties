 jakarta.security.auth,jakarta.security.auth.callback,jakarta.security.auth.login,jakarta.security.auth.x500,\
 jakarta.security.cert,jakarta.security.cert.*,\
 jakarta.security.sasl,\
 jakarta.servlet,jakarta.servlet.http,jakarta.servlet.jsp,jakarta.servlet.jsp.tagext,jakarta.servlet.jsp.el,\
 jakarta.transaction,\
 jakarta.validation,\
 jakarta.websocket,jakarta.websocket.*,\
